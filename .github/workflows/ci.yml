name: test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    name: Test (JDK ${{ matrix.java }}, ${{ matrix.clojure }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        java:
          - '8'
          - '11'
          - '17'
          - '21'
        clojure:
          - clojure-1-10
          - clojure-1-11
          - clojure-1-12
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
          cache: maven
          cache-dependency-path: project.clj

      - name: Install Leiningen
        run: |
          curl -fsSL https://raw.githubusercontent.com/technomancy/leiningen/stable/bin/lein -o lein
          chmod +x lein
          sudo mv lein /usr/local/bin/lein
          lein version

      - run: lein with-profile +${{ matrix.clojure }} test

  reflection:
    name: Reflection-clean (src)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
          cache-dependency-path: project.clj

      - name: Install Leiningen
        run: |
          curl -fsSL https://raw.githubusercontent.com/technomancy/leiningen/stable/bin/lein -o lein
          chmod +x lein
          sudo mv lein /usr/local/bin/lein
          lein version

      - name: Fail on src reflection warnings
        run: |
          warnings=$(lein check 2>&1 | grep -i "reflection warning" || true)
          if [ -n "$warnings" ]; then
            echo "$warnings"
            echo "::error::reflection warnings present in src"
            exit 1
          fi
