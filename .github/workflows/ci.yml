name: CI

on:
  push:
    branches:
      - main
    tags:
      - Release-*
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    name: Test (JDK ${{ matrix.java }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        java:
          - '8'
          - '11'
          - '17'
          - '21'
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
          cache: maven
          cache-dependency-path: project.clj

      - name: Install Leiningen
        run: |
          curl -fsSL https://raw.githubusercontent.com/technomancy/leiningen/stable/bin/lein -o lein
          chmod +x lein
          sudo mv lein /usr/local/bin/lein
          lein version

      - run: lein test

  deploy:
    name: Deploy to Clojars
    if: startsWith(github.ref, 'refs/tags/Release-')
    needs: test
    runs-on: ubuntu-latest
    env:
      clojars_username: ${{ secrets.CLOJARS_USERNAME }}
      clojars_password: ${{ secrets.CLOJARS_PASSWORD }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '8'
          cache: maven
          cache-dependency-path: project.clj

      - name: Install Leiningen
        run: |
          curl -fsSL https://raw.githubusercontent.com/technomancy/leiningen/stable/bin/lein -o lein
          chmod +x lein
          sudo mv lein /usr/local/bin/lein
          lein version

      - name: Check deploy secrets
        run: |
          test -n "$clojars_username"
          test -n "$clojars_password"

      - name: Configure Clojars deploy repository
        run: |
          mkdir -p "$HOME/.lein"
          cat > "$HOME/.lein/profiles.clj" <<'EOF'
          {:user {:repositories [["clojars" {:url "https://repo.clojars.org"
                                             :username :env/clojars_username
                                             :password :env/clojars_password
                                             :sign-releases false}]]}}
          EOF

      - run: lein deploy clojars
